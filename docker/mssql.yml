# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: dotnetfinal
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=DoRe34/26C7
      - MSSQL_PID=Express
    ports:
      - 1433:1433
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "DoRe34/26C7", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mssql-data:/var/opt/mssql
volumes:
  mssql-data: